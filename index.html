        }

        }

            to { opacity: 1; transform: translateX(0); }

                                        <div class="mt-1 shrink-0 w-4 h-4 rounded-full bg-slate-800 border-2 border-slate-800"></div>
                                        <span>${point}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                }

                slideDiv.innerHTML = `
                    <div class="flex items-center gap-6 mb-10 border-b-8 border-slate-800 pb-6">
                        <div class="w-20 h-20 rounded-2xl bg-white brutal-border flex items-center justify-center shrink-0 shadow-[6px_6px_0px_0px_rgba(30,41,59,1)]">
                            <i data-lucide="${data.icon || 'star'}" class="w-10 h-10 text-slate-800"></i>
                        </div>
                        <h2 class="text-4xl md:text-5xl font-black tracking-tight">${data.title}</h2>
                    </div>
                    
                    ${pointsHtml}
                `;
            }

            // 加入講稿按鈕與區塊
            if (data.script) {
                const scriptSection = document.createElement('div');
                scriptSection.className = 'mt-auto pt-6 border-t-4 border-slate-800 border-dashed';
                scriptSection.innerHTML = `
                    <button onclick="toggleScript(this)" class="brutal-button bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold text-xl flex items-center gap-2 mb-4 hover:bg-slate-700">
                        <i data-lucide="mic" class="w-6 h-6 text-yellow-300"></i>
                        <span>展開講者講稿</span>
                        <i data-lucide="chevron-down" class="w-5 h-5 ml-2 toggle-icon transition-transform"></i>
                    </button>
                    <div class="script-content hidden bg-white brutal-border p-6 rounded-2xl shadow-[6px_6px_0px_0px_rgba(30,41,59,1)]">
                        <p class="text-2xl font-bold text-slate-700 leading-relaxed tracking-wide">
                            ${data.script}
                        </p>
                    </div>
                `;
                slideDiv.appendChild(scriptSection);
            }

            container.appendChild(slideDiv);
            lucide.createIcons();
            updateControls();
        }

        // 切換講稿顯示
        window.toggleScript = function(btn) {
            const content = btn.nextElementSibling;
            const icon = btn.querySelector('.toggle-icon');
            content.classList.toggle('hidden');
            if(content.classList.contains('hidden')) {
                icon.style.transform = 'rotate(0deg)';
                btn.querySelector('span').innerText = '展開講者講稿';
            } else {
                icon.style.transform = 'rotate(180deg)';
                btn.querySelector('span').innerText = '隱藏講者講稿';
                // 稍微捲動讓講稿清楚顯示
                content.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
        }

        // 更新按鈕與進度列狀態
        function updateControls() {
            btnPrev.disabled = currentIndex === 0;
            btnNext.disabled = currentIndex === slideData.length - 1;
            spanCurrent.textContent = currentIndex + 1;
            
            // 計算進度列百分比
            const progress = ((currentIndex) / (slideData.length - 1)) * 100;
            progressBar.style.width = `${progress}%`;
        }

        // 綁定事件
        btnPrev.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex);
            }
        });

        btnNext.addEventListener('click', () => {
            if (currentIndex < slideData.length - 1) {
                currentIndex++;
                renderSlide(currentIndex);
            }
        });

        // 鍵盤左右鍵切換
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                btnNext.click();
            } else if (e.key === 'ArrowLeft') {
                btnPrev.click();
            }
        });

        // 初始化
        spanTotal.textContent = slideData.length;
        renderSlide(currentIndex);

    </script>
</body>
</html>
